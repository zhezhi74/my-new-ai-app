version: '3.8'

services:
  # --- 1. 数据库和缓存依赖 ---
  mysql_db:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: 303600677gby
      MYSQL_DATABASE: ai_customer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - my-network

  redis_cache:
    image: redis:6.2-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - my-network

  weaviate_db:
    image: cr.weaviate.io/semitechnologies/weaviate:1.24.1
    container_name: weaviate_db
    ports:
      - "8090:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-openai' # 这个可以保留，即使不用
      ENABLE_MODULES: 'text2vec-openai'
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - my-network

  # --- 2. 后端微服务 ---
  # 注意：这里的服务名 (e.g., mysql_db) 将成为容器的 DNS 主机名
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    depends_on:
      - mysql_db
    environment:
      # 在这里覆盖 application.yml 中的数据库地址
      - spring.datasource.url=jdbc:mysql://mysql_db:3306/ai_customer?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    networks:
      - my-network

  knowledge-service:
    build:
      context: ./knowledge-service
      dockerfile: Dockerfile
    container_name: knowledge-service
    depends_on:
      - mysql_db
      - weaviate_db
    environment:
      - spring.datasource.url=jdbc:mysql://mysql_db:3306/ai_customer?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      # 注意：如果Ollama运行在宿主机上，这里可能需要特殊网络配置
      - ai.ollama-embedding.base-url=http://host.docker.internal:11434 
    networks:
      - my-network

  chat-service:
    build:
      context: ./chat-service
      dockerfile: Dockerfile
    container_name: chat-service
    depends_on:
      - mysql_db
      - redis_cache
    environment:
      - spring.datasource.url=jdbc:mysql://mysql_db:3306/ai_customer?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      - spring.redis.host=redis_cache
      # FeignClient 的 URL 也需要使用服务名
      - feign.client.config.knowledge-service.url=http://knowledge-service:8082
    networks:
      - my-network

  gateway-service:
    build:
      context: ./gateway-service
      dockerfile: Dockerfile
    container_name: gateway-service
    ports:
      - "8888:8888" # 对外暴露网关端口
    depends_on:
      - user-service
      - knowledge-service
      - chat-service
    environment:
      # 更新路由到内部服务名
      - spring.cloud.gateway.routes[0].uri=http://user-service:8081
      - spring.cloud.gateway.routes[1].uri=http://knowledge-service:8082
      - spring.cloud.gateway.routes[2].uri=http://chat-service:8083
      - spring.cloud.gateway.routes[3].uri=http://chat-service:8083
    networks:
      - my-network

  # --- 3. 前端服务 ---
  frontend:
    build:
      context: ../my-ai-app # context 指向前端项目的根目录
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "5173:80" # 将本机的 5173 端口映射到容器的 80 端口
    networks:
      - my-network

# --- 4. 共享网络和数据卷定义 ---
networks:
  my-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  weaviate_data: