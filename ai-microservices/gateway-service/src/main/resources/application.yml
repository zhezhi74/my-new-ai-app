server:
  port: 8888 # 这是整个应用的统一入口

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        # 用户服务的路由 (不变)
        - id: user_route
          uri: http://localhost:8081
          predicates:
            - Path=/api/user/**

        # 【核心修正】知识库服务的路由，路径更精确
        - id: knowledge_route
          uri: http://localhost:8082
          predicates:
            - Path=/api/knowledge/**

        # 聊天服务的路由 (不变)
        - id: chat_route
          uri: http://localhost:8083
          predicates:
            - Path=/api/chat/**

        # 【核心修正】管理员历史记录接口的路由，精确指向chat-service
        - id: admin_history_route
          uri: http://localhost:8083
          predicates:
            - Path=/api/admin/history/**

jwt: # JWT配置也需要复制过来，因为网关要用它来解析token
  secret: "303600677gby"
  expiration: 604800000